name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pgsql

      - name: Install dependencies
        run: cd app && composer install --no-interaction

      - name: Run PHPStan
        run: cd app && vendor/bin/phpstan analyse -c phpstan.neon

  cs-fix:
    name: CS-Fixer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pgsql

      - name: Install dependencies
        run: cd app && composer install --no-interaction

      - name: Check coding standards
        run: cd app && vendor/bin/php-cs-fixer fix --dry-run --diff
