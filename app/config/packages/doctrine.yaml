doctrine:
    dbal:
      dbname: '%env(resolve:POSTGRES_DATABASE)%'
      host: '%env(resolve:POSTGRES_HOST)%'
      port: '%env(resolve:POSTGRES_PORT)%'
      user: '%env(resolve:POSTGRES_USER)%'
      password: '%env(resolve:POSTGRES_PASSWORD)%'
      driver: 'pdo_pgsql'
      server_version: '15.5'
    orm:
        validate_xml_mapping: true
        naming_strategy: doctrine.orm.naming_strategy.underscore
        auto_mapping: true
        mappings:
          context_core:
            is_bundle: false
            type: xml
            dir: '%kernel.project_dir%/src/Infrastructure/Persistence/Doctrine/ORM/Mapping'
            prefix: 'App\Domain'
            alias: 'App\Domain'

when@test:
    doctrine:
        dbal:
            dbname_suffix: '_test%env(default::TEST_TOKEN)%'

framework:
    cache:
        pools:
            doctrine.result_cache_pool:
                adapter: cache.app
            doctrine.system_cache_pool:
                adapter: cache.system
